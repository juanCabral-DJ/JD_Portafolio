<section class="flex flex-col md:flex-row gap-4 border border-red-200/20 mb-10 m-2 sm:m-4 w-full max-w-360 mx-auto">
  <div
    class="border-b-[0.5px] md:border-b-0 md:border-r-[0.5px] bg-[#000000]/40 border-red-200/30 flex flex-col gap-3 h-full p-4 sm:p-5 w-full md:w-6/12"
  >
    <div class="flex flex-col justify-center items-start text-center mb-4">
      <span class="text-[#ff4d4d] font-mono text-sm font-medium tracking-wide mb-1"
        >04. establish_connection()</span
      >
      <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Send a Message</h2>
    </div>
    <div class="flex flex-col gap-2">
      <form [formGroup]="FormContact" (ngSubmit)="onSubmit()" class="flex flex-col p-4">
        <fieldset class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col gap-1">
            <label for="name" class="text-red-200 font-bold text-sm">NAME</label>
            <input
              type="text"
              id="name"
              formControlName="name"
              placeholder="Juan Cabral..."
              class="border-[0.5px] border-red-200/50 p-3 hover:border-cyan-400"
            />
          </div>
          <div class="flex flex-col gap-1">
            <label for="email" class="text-red-200 font-bold text-sm">EMAIL</label>
            <input
              formControlName="email"
              type="text"
              id="email"
              placeholder="Example@example.com"
              class="border-[0.5px] border-red-200/50 p-3 hover:border-cyan-400"
            />
          </div>
        </fieldset>
        <fieldset class="flex flex-col gap-3 mt-5">
          <div class="flex flex-col gap-1">
            <label for="message" class="text-red-200 font-bold text-sm">MESSAGE</label>
            <textarea
              name="message"
              formControlName="message"
              id="message"
              class="border border-red-200/40 h-40 p-3 hover:border-cyan-400"
            ></textarea>
          </div>
        </fieldset>
        <div class="flex flex-col gap-3 mt-8">
          <button
            class="p-3 uppercase font-bold text-red-200 border border-red-200 cursor-pointer hover:bg-200-red hover:text-red-500"
            type="submit"
          >
            enviar
          </button>
        </div>
      </form>
    </div>
  </div>
  <div class=" flex flex-col gap-3 md:w-6/12 p-5 pt-7 h-full">
    <div class="flex flex-col text-cyan-500 font-semibold text-lg  font-mono">
      <h1>Ready to build the future? Let's connect. <span class="cursor"> |</span></h1>
    </div>

    <div class="flex flex-col gap-8 mt-5 ">
      <div class="flex justify-start items-center gap-3 ">
        <span class=""><i class="pi pi-envelope text-2xl! text-red-500 mr-3"></i></span>
        <div class="flex flex-col">
          <h2 class="text-red-200 uppercase font-semibold text-xs">email</h2>
          <p class="font-medium text-white">juandavidcabral71@gmail.com</p>
        </div>
      </div>

      <div class="flex justify-start items-center gap-3 ">
        <span class=""><i class="pi pi-envelope text-2xl! text-red-500 mr-3"></i></span>
        <div class="flex flex-col">
          <h2 class="text-red-200 uppercase font-semibold text-xs">base_location</h2>
          <p class="font-medium text-white">Remote / Bani, DO</p>
        </div>
      </div>

    </div>
  </div>
</section>
