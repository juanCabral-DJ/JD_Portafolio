<div class="flex flex-col gap-8 px-2 sm:px-4 lg:px-0 w-full md:w-11/12  xl:ml-6  xl:w-[90%] mb-10">
  <div class="flex flex-col justify-center items-center">
    <h1 class="text-red-600 font-medium text-lg font-mono">02. tech_capabilities</h1>
    <p class="text-3xl font-bold mb-5">The Tech Stack</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-8 w-full">
      @for (category of categories; track category.title) {
        <p-card
          class="p-4 hover:border hover:border-cyan-400 bg-gray-500/20!"
          [class.border-red-500]="category.emphasized"
        >
          <ng-template #header>
            <p class="uppercase font-bold text-sm p-4 pb-0 flex justify-left items-center">
              <i [class]="category.icon + ' text-cyan-400 pr-2'"></i>
              {{ category.title }}
            </p>
          </ng-template>

          <div class="flex flex-wrap gap-4  mt-5">
            @for (tag of category.tags; track tag.label) {
              <span
                class="font-mono text-xs px-2 py-1 rounded border"
                [class.bg-red-500]="tag.highlight"
                [class.text-white]="tag.highlight"
                [class.border-transparent]="tag.highlight"
                [class.text-gray-300]="!tag.highlight"
                [class.border-neutral-700]="!tag.highlight"
                [class.bg-white/5]="!tag.highlight"
              >
                <span [class.text-red-400]="!tag.highlight" [class.opacity-80]="!tag.highlight">--{{ tag.prefix }}:</span>
                {{ tag.label }}
              </span>
            }
          </div>
        </p-card>
      }
    </div>
  </div>
</div>
