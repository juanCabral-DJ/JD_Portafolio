<svg viewBox="0 0 640 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F131C"/>
      <stop offset="100%" stop-color="#151A24"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="0" y="40" width="640" height="480" rx="10"/>
    </clipPath>
    <style>
      @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
      .cursor { animation: blink 1s steps(1) infinite; }
      .mono { font-family: 'SFMono-Regular','Fira Code','JetBrains Mono',Consolas,monospace; }
    </style>
  </defs>

  <!-- offset frames (mismo patrón que la foto) -->
  <rect x="24" y="24" width="616" height="496" fill="none" stroke="#FF5470" stroke-width="2"/>

  <!-- terminal window -->
  <g transform="translate(0,0)">
    <rect x="0" y="0" width="640" height="520" rx="10" fill="url(#bg)" stroke="#262C3A" stroke-width="1.5"/>

    <!-- title bar -->
    <rect x="0" y="0" width="640" height="40" rx="10" fill="#1B212D"/>
    <rect x="0" y="20" width="640" height="20" fill="#1B212D"/>
    <circle cx="24" cy="20" r="6" fill="#FF5470"/>
    <circle cx="46" cy="20" r="6" fill="#E8B33C"/>
    <circle cx="68" cy="20" r="6" fill="#22D3EE"/>
    <text x="620" y="25" text-anchor="end" class="mono" font-size="13" fill="#5B6472">about.component.ts</text>

    <g clip-path="url(#termClip)" class="mono" font-size="15">
      <!-- line numbers -->
      <g fill="#3D4557">
        <text x="18" y="72">1</text>
        <text x="18" y="98">2</text>
        <text x="18" y="124">3</text>
        <text x="18" y="150">4</text>
        <text x="18" y="176">5</text>
        <text x="18" y="202">6</text>
        <text x="18" y="228">7</text>
        <text x="18" y="254">8</text>
        <text x="18" y="280">9</text>
        <text x="12" y="306">10</text>
        <text x="12" y="332">11</text>
        <text x="12" y="358">12</text>
        <text x="12" y="384">13</text>
        <text x="12" y="410">14</text>
        <text x="12" y="436">15</text>
        <text x="12" y="462">16</text>
        <text x="12" y="488">17</text>
      </g>

      <!-- code -->
      <g>
        <text x="52" y="72"><tspan fill="#C792EA">import</tspan><tspan fill="#B6BCC7"> { Component, signal } </tspan><tspan fill="#C792EA">from</tspan><tspan fill="#89DDFF"> '@angular/core'</tspan><tspan fill="#B6BCC7">;</tspan></text>

        <text x="52" y="124"><tspan fill="#C792EA">@Component</tspan><tspan fill="#B6BCC7">({</tspan></text>
        <text x="72" y="150"><tspan fill="#22D3EE">selector</tspan><tspan fill="#B6BCC7">: </tspan><tspan fill="#C3E88D">'app-about'</tspan><tspan fill="#B6BCC7">,</tspan></text>
        <text x="72" y="176"><tspan fill="#22D3EE">standalone</tspan><tspan fill="#B6BCC7">: </tspan><tspan fill="#FF5470">true</tspan></text>
        <text x="52" y="202"><tspan fill="#B6BCC7">})</tspan></text>

        <text x="52" y="254"><tspan fill="#C792EA">export</tspan><tspan fill="#B6BCC7"> </tspan><tspan fill="#C792EA">class</tspan><tspan fill="#FFCB6B"> AboutComponent</tspan><tspan fill="#B6BCC7"> {</tspan></text>

        <text x="72" y="280"><tspan fill="#22D3EE">name</tspan><tspan fill="#B6BCC7"> = </tspan><tspan fill="#82AAFF">signal</tspan><tspan fill="#B6BCC7">(</tspan><tspan fill="#C3E88D">'Juan David Cabral'</tspan><tspan fill="#B6BCC7">);</tspan></text>
        <text x="72" y="306"><tspan fill="#22D3EE">role</tspan><tspan fill="#B6BCC7"> = </tspan><tspan fill="#82AAFF">signal</tspan><tspan fill="#B6BCC7">(</tspan><tspan fill="#C3E88D">'Frontend Architect'</tspan><tspan fill="#B6BCC7">);</tspan></text>
        <text x="72" y="332"><tspan fill="#22D3EE">stack</tspan><tspan fill="#B6BCC7"> = [</tspan><tspan fill="#C3E88D">'Angular'</tspan><tspan fill="#B6BCC7">, </tspan><tspan fill="#C3E88D">'PrimeNG'</tspan><tspan fill="#B6BCC7">, </tspan><tspan fill="#C3E88D">'RxJS'</tspan><tspan fill="#B6BCC7">];</tspan></text>

        <text x="72" y="384"><tspan fill="#82AAFF">buildInterface</tspan><tspan fill="#B6BCC7">(): </tspan><tspan fill="#FFCB6B">Experience</tspan><tspan fill="#B6BCC7"> {</tspan></text>
        <text x="92" y="410"><tspan fill="#C792EA">return</tspan><tspan fill="#B6BCC7"> {</tspan></text>
        <text x="112" y="436"><tspan fill="#22D3EE">clean</tspan><tspan fill="#B6BCC7">: </tspan><tspan fill="#FF5470">true</tspan><tspan fill="#B6BCC7">,</tspan></text>
        <text x="112" y="462"><tspan fill="#22D3EE">scalable</tspan><tspan fill="#B6BCC7">: </tspan><tspan fill="#FF5470">true</tspan></text>
        <text x="92" y="488"><tspan fill="#B6BCC7">};</tspan></text>
      </g>

      <text x="52" y="514" fill="#22D3EE">$<tspan fill="#B6BCC7" dx="8">ng build --prod</tspan><tspan class="cursor" fill="#22D3EE" dx="4">▍</tspan></text>
    </g>
  </g>
</svg>
